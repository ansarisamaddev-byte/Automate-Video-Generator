name: Daily Instagram Reel Post

on:
  schedule:
    # Runs at 02:30 UTC (8:00 AM IST) and 15:30 UTC (9:00 PM IST)
    # GitHub Actions uses UTC time. Adjusted for IST (UTC+5:30)
    - cron: '30 2 * * *'
    - cron: '30 15 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Automation Script
        env:
          # It is safer to use Secrets for your tokens/keys
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python insta_caption_post_runner.py

      - name: Commit Updated CSV
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add database.csv
          git commit -m "Update database: mark reel as posted" || echo "No changes to commit"
          git push
